name: Custom Collector (Telegram only)

on:
  workflow_dispatch:   # فقط با اجرای دستی شروع می‌شود

concurrency:
  group: collector-run
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r config/requirements.txt

      # ----- مرحلهٔ ۱: دریافت کانفیگ از تلگرام -----
      - name: Run Telegram Collector
        run: python src/telegram_collector.py

      # ----- مرحلهٔ ۲: خروجی گرفتن از دیتابیس برای ساخت all_servers.txt -----
      - name: Export DB to all_servers.txt
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('collector.db')
          cursor = conn.cursor()
          cursor.execute('SELECT config FROM configs')
          rows = cursor.fetchall()
          with open('all_servers.txt', 'w', encoding='utf-8') as f:
              for row in rows:
                  f.write(row[0] + '\n')
          conn.close()
          print(f'✅ Exported {len(rows)} configs to all_servers.txt')
          "

      # ----- مرحلهٔ ۳: تفکیک بر اساس پروتکل و حذف تکراری‌ها -----
      - name: Split joined proxy links
        run: |
          if [ -f all_servers.txt ]; then
            python src/split_links.py all_servers.txt
          fi

      - name: Advanced dedup configs
        run: |
          if [ -f all_servers.txt ]; then
            python src/dedup_configs.py all_servers.txt
          fi

      - name: Rebuild protocol files from cleaned all_servers.txt
        run: python src/rebuild_protocols.py

      # ----- مرحلهٔ ۴: ارسال تغییرات به مخزن -----
      - name: Commit and push updated files
        timeout-minutes: 5
        continue-on-error: true
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          mkdir -p servers data
          touch all_servers.txt
          git add -A all_servers.txt servers/ data/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update all servers [skip ci]"
            git pull --rebase --strategy-option ours
            git push
          fi

      # ----- مرحلهٔ ۵: اجرای مجدد خودکار -----
      - name: Trigger next run
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'collector.yml',
              ref: 'main'
            });
